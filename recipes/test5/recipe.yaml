            - name: gsd/gsd-complete-milestone
              content: |
                ---
                type: prompt
                name: gsd-complete-milestone
                description: Archive completed milestone and prepare for next version
                argument-hint: <version>
                permissions:
                   read: true
                   write: true
                   bash: true
                ---

                <objective>
                Mark milestone {{version}} complete, archive to milestones/, and update ROADMAP.md and REQUIREMENTS.md.

                Purpose: Create historical record of shipped version, archive milestone artifacts (roadmap + requirements), and prepare for next milestone.
                Output: Milestone archived (roadmap + requirements), PROJECT.md evolved, git tagged.
                </objective>

                <execution_context>
                **Load these files NOW (before proceeding):**

                - @$HOME/.config/opencode/get-shit-done/workflows/complete-milestone.md (main workflow)
                - @$HOME/.config/opencode/get-shit-done/templates/milestone-archive.md (archive template)
                  </execution_context>

                <context>
                **Project files:**
                - `.planning/ROADMAP.md`
                - `.planning/REQUIREMENTS.md`
                - `.planning/STATE.md`
                - `.planning/PROJECT.md`

                **User input:**

                - Version: {{version}} (e.g., "1.0", "1.1", "2.0")
                  </context>

                <process>

                **Follow complete-milestone.md workflow:**

                0. **Check for audit:**

                   - Look for `.planning/v{{version}}-MILESTONE-AUDIT.md`
                   - If missing or stale: recommend `/gsd-audit-milestone` first
                   - If audit status is `gaps_found`: recommend `/gsd-plan-milestone-gaps` first
                   - If audit status is `passed`: proceed to step 1

                   ```markdown
                   ## Pre-flight Check

                   {If no v{{version}}-MILESTONE-AUDIT.md:}
                   ⚠ No milestone audit found. Run `/gsd-audit-milestone` first to verify
                   requirements coverage, cross-phase integration, and E2E flows.

                   {If audit has gaps:}
                   ⚠ Milestone audit found gaps. Run `/gsd-plan-milestone-gaps` to create
                   phases that close the gaps, or proceed anyway to accept as tech debt.

                   {If audit passed:}
                   ✓ Milestone audit passed. Proceeding with completion.
                   ```

                1. **Verify readiness:**

                   - Check all phases in milestone have completed plans (SUMMARY.md exists)
                   - Present milestone scope and stats
                   - Wait for confirmation

                2. **Gather stats:**

                   - Count phases, plans, tasks
                   - Calculate git range, file changes, LOC
                   - Extract timeline from git log
                   - Present summary, confirm

                3. **Extract accomplishments:**

                   - read all phase SUMMARY.md files in milestone range
                   - Extract 4-6 key accomplishments
                   - Present for approval

                4. **Archive milestone:**

                   - Create `.planning/milestones/v{{version}}-ROADMAP.md`
                   - Extract full phase details from ROADMAP.md
                   - Fill milestone-archive.md template
                   - Update ROADMAP.md to one-line summary with link

                5. **Archive requirements:**

                   - Create `.planning/milestones/v{{version}}-REQUIREMENTS.md`
                   - Mark all v1 requirements as complete (checkboxes checked)
                   - Note requirement outcomes (validated, adjusted, dropped)
                   - Delete `.planning/REQUIREMENTS.md` (fresh one created for next milestone)

                6. **Update PROJECT.md:**

                   - Add "Current State" section with shipped version
                   - Add "Next Milestone Goals" section
                   - Archive previous content in `<details>` (if v1.1+)

                7. **Commit and tag:**

                   - Stage: MILESTONES.md, PROJECT.md, ROADMAP.md, STATE.md, archive files
                   - Commit: `chore: archive v{{version}} milestone`
                   - Tag: `git tag -a v{{version}} -m "[milestone summary]"`
                   - Ask about pushing tag

                8. **Offer next steps:**
                   - `/gsd-new-milestone` — start next milestone (questioning → research → requirements → roadmap)

                </process>

                <success_criteria>

                - Milestone archived to `.planning/milestones/v{{version}}-ROADMAP.md`
                - Requirements archived to `.planning/milestones/v{{version}}-REQUIREMENTS.md`
                - `.planning/REQUIREMENTS.md` deleted (fresh for next milestone)
                - ROADMAP.md collapsed to one-line entry
                - PROJECT.md updated with current state
                - Git tag v{{version}} created
                - Commit successful
                - User knows next steps (including need for fresh requirements)
                  </success_criteria>

                <critical_rules>

                - **Load workflow first:** read complete-milestone.md before executing
                - **Verify completion:** All phases must have SUMMARY.md files
                - **User confirmation:** Wait for approval at verification gates
                - **Archive before deleting:** Always create archive files before updating/deleting originals
                - **One-line summary:** Collapsed milestone in ROADMAP.md should be single line with link
                - **Context efficiency:** Archive keeps ROADMAP.md and REQUIREMENTS.md constant size per milestone
                - **Fresh requirements:** Next milestone starts with `/gsd-new-milestone` which includes requirements definition
                  </critical_rules>
            - name: gsd/gsd-debug
              content: |
                ---
                name: gsd-debug
                description: Systematic debugging with persistent state across context resets
                argument-hint: [issue description]
                permissions:
                   read: true
                   bash: true
                   task: true
                   question: true
                ---

                <objective>
                Debug issues using scientific method with subagent isolation.

                **Orchestrator role:** Gather symptoms, spawn gsd-debugger agent, handle checkpoints, spawn continuations.

                **Why subagent:** Investigation burns context fast (reading files, forming hypotheses, testing). Fresh 200k context per investigation. Main context stays lean for user interaction.
                </objective>

                <available_agent_types>
                Valid GSD subagent types (use exact names — do not fall back to 'general'):
                - gsd-debugger — Diagnoses and fixes issues
                </available_agent_types>

                <context>
                User's issue: $ARGUMENTS

                Check for active sessions:
                ```bash
                ls .planning/debug/*.md 2>/dev/null | grep -v resolved | head -5
                ```
                </context>

                <process>

                ## 0. Initialize Context

                ```bash
                INIT=$(node "$HOME/.config/opencode/get-shit-done/bin/gsd-tools.cjs" state load)
                if [[ "$INIT" == @file:* ]]; then INIT=$(cat "${INIT#@file:}"); fi
                ```

                Extract `commit_docs` from init JSON. Resolve debugger model:
                ```bash
                debugger_model=$(node "$HOME/.config/opencode/get-shit-done/bin/gsd-tools.cjs" resolve-model gsd-debugger --raw)
                ```

                ## 1. Check Active Sessions

                If active sessions exist AND no $ARGUMENTS:
                - List sessions with status, hypothesis, next action
                - User picks number to resume OR describes new issue

                If $ARGUMENTS provided OR user describes new issue:
                - Continue to symptom gathering

                ## 2. Gather Symptoms (if new issue)

                Use question for each:

                1. **Expected behavior** - What should happen?
                2. **Actual behavior** - What happens instead?
                3. **Error messages** - Any errors? (paste or describe)
                4. **Timeline** - When did this start? Ever worked?
                5. **Reproduction** - How do you trigger it?

                After all gathered, confirm ready to investigate.

                ## 3. Spawn gsd-debugger Agent

                Fill prompt and spawn:

                ```markdown
                <objective>
                Investigate issue: {slug}

                **Summary:** {trigger}
                </objective>

                <symptoms>
                expected: {expected}
                actual: {actual}
                errors: {errors}
                reproduction: {reproduction}
                timeline: {timeline}
                </symptoms>

                <mode>
                symptoms_prefilled: true
                goal: find_and_fix
                </mode>

                <debug_file>
                Create: .planning/debug/{slug}.md
                </debug_file>
                ```

                ```
                task(
                  prompt=filled_prompt,
                  subagent_type="gsd-debugger",
                  model="{debugger_model}",
                  description="Debug {slug}"
                )
                ```

                ## 4. Handle Agent Return

                **If `## ROOT CAUSE FOUND`:**
                - Display root cause and evidence summary
                - Offer options:
                  - "Fix now" - spawn fix subagent
                  - "Plan fix" - suggest /gsd-plan-phase --gaps
                  - "Manual fix" - done

                **If `## CHECKPOINT REACHED`:**
                - Present checkpoint details to user
                - Get user response
                - If checkpoint type is `human-verify`:
                  - If user confirms fixed: continue so agent can finalize/resolve/archive
                  - If user reports issues: continue so agent returns to investigation/fixing
                - Spawn continuation agent (see step 5)

                **If `## INVESTIGATION INCONCLUSIVE`:**
                - Show what was checked and eliminated
                - Offer options:
                  - "Continue investigating" - spawn new agent with additional context
                  - "Manual investigation" - done
                  - "Add more context" - gather more symptoms, spawn again

                ## 5. Spawn Continuation Agent (After Checkpoint)

                When user responds to checkpoint, spawn fresh agent:

                ```markdown
                <objective>
                Continue debugging {slug}. Evidence is in the debug file.
                </objective>

                <prior_state>
                <files_to_read>
                - .planning/debug/{slug}.md (Debug session state)
                </files_to_read>
                </prior_state>

                <checkpoint_response>
                **Type:** {checkpoint_type}
                **Response:** {user_response}
                </checkpoint_response>

                <mode>
                goal: find_and_fix
                </mode>
                ```

                ```
                task(
                  prompt=continuation_prompt,
                  subagent_type="gsd-debugger",
                  model="{debugger_model}",
                  description="Continue debug {slug}"
                )
                ```

                </process>

                <success_criteria>
                - [ ] Active sessions checked
                - [ ] Symptoms gathered (if new)
                - [ ] gsd-debugger spawned with context
                - [ ] Checkpoints handled correctly
                - [ ] Root cause confirmed before fixing
                </success_criteria>
